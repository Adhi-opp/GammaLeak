# /etc/cloudflared/config.yml
# Replace <TUNNEL_UUID> with the value from `cloudflared tunnel create gammaleak`.
# Replace dash.example.com with your real DNS hostname (set up with
# `cloudflared tunnel route dns gammaleak dash.example.com`).

tunnel: <TUNNEL_UUID>
credentials-file: /root/.cloudflared/<TUNNEL_UUID>.json

ingress:
  - hostname: dash.example.com
    service: http://localhost:8080
  - service: http_status:404

# Optional: enable Cloudflare Access (Zero Trust) on the dashboard hostname
# from the Cloudflare dashboard so only your email / a small allowlist can
# reach the engine. Free for up to 50 users.
